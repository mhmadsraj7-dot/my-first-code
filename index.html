<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر محمد الإلكتروني</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a3c5a 0%, #a8e6cf 100%);
            margin: 0;
            padding: 20px;
            color: white;
            min-height: 100vh;
        }
        header { text-align: center; padding: 20px; }
        .shop-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .product-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-image {
            width: 100%;
            height: 150px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        .price { font-size: 20px; font-weight: bold; color: #a8e6cf; }
        .buy-btn {
            display: block;
            background: #a8e6cf;
            color: #1a3c5a;
            padding: 10px;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
        }
        .buy-btn:hover { background: #fff; }
    </style>
</head>
<body>

<header>
    <h1>متجر محمد 🛍️</h1>
    <p>أفضل البضائع بأفضل الأسعار</p>
</header>

<div class="shop-container">
    <div class="product-card">
        <div class="product-image">🖼️ صورة المنتج</div>
        <h3>اسم البضاعة هنا</h3>
        <p class="price">50 $</p>
        <a href="#" class="buy-btn" onclick="alert('تمت الإضافة للسلة!')">شراء الآن</a>
    </div>

    <div class="product-card">
        <div class="product-image">📦 منتج مميز</div>
        <h3>بضاعة ثانية</h3>
        <p class="price">120 $</p>
        <a href="#" class="buy-btn" onclick="alert('تمت الإضافة للسلة!')">شراء الآن</a>
    </div>
</div>

<footer style="text-align: center; margin-top: 50px; opacity: 0.7;">
    حقوق النشر محفوظة لمتجر محمد 2026
</footer>

</body>
</html>
